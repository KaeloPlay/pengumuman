<!DOCTYPE html>
<html>
    <head>
        <script src="/main/resource/script.js" defer></script>
        <link href="/main/resource/style.css" rel="stylesheet">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

        <title>Pengumuman VIIC</title>
    </head>
    <body>
        <div class="wrapper">
            <div class="side left">
                <p>Kira-kira, bakal diisi apa yaa🤔</p>
            </div>
            <div class="side right">
                <p>Apa hayoo..</p>
            </div>
            <div class="container" id="container">
                <div class="header hidden">
                    <p style="
                    opacity: 0.7;
                    margin-left: 12px;
                    font-size: clamp(0px, 5vw, 28px);
                    font-weight: 500;
                    text-wrap: balance;
                    ">Pengumuman Kelas</p>

                    <span id="date" style="
                    position: relative;
                    top: 4px;
                    margin-left: 8px;
                    margin-right: 12px;
                    color: gray;
                    font-family: monospace, sans-serif;
                    font-size: clamp(8px, 2vw, 12px);
                    text-wrap: balance;
                    ">( undefined )</span>
                </div>
                <div class="card mapel hidden">
                    <h3>🗓️ Mapel Besok</h3>
                    <ul></ul>
                </div>
                <div class="two-row">
                    <div class="card pr hidden">
                        <h3>📌 PR Besok</h3>
                        <ul></ul>
                    </div>
                    <div class="card piket hidden">
                        <h3>🧹 Piket Besok</h3>
                        <ul></ul>
                    </div>
                </div>
                <div class="card note hidden">
                    <h3>📝 Tambahan</h3>
                    <p></p>
                </div>
                <p class="subinfo hidden" style="
                opacity: 0.5;
                text-align: center;
                font-size: clamp(10px, 1.5vh, 20px);
                ">Web dibuat oleh Kaelo.<br>Pengumuman diketik oleh Firly (sekretaris).</p>
            </div>
        </div>
    </body>
</html>
