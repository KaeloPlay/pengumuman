<!DOCTYPE html>
<html>
    <head>
        <script src="/main/resource/script.js" defer></script>
        <link href="/main/resource/style.css" rel="stylesheet">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

        <title>Pengumuman VIIC</title>
    </head>
    <body>
        <div class="wrapper">
            <div class="container" id="container">
                <div class="page main-page">
                    <div class="header hidden">
                        <p style="
                        opacity: 0.7;
                        margin-left: 12px;
                        font-size: clamp(0px, 5vw, 28px);
                        font-weight: 500;
                        text-wrap: balance;
                        ">Pengumuman Kelas</p>
    
                        <span id="date" style="
                        position: relative;
                        top: 4px;
                        margin-left: 8px;
                        margin-right: 12px;
                        color: gray;
                        font-family: monospace, sans-serif;
                        font-size: clamp(8px, 2vw, 12px);
                        text-wrap: balance;
                        ">( undefined )</span>
                    </div>
                    <div class="card mapel hidden" id="mapel-section">
                        <h3>🗓️ Mapel Besok</h3>
                        <ul></ul>
                    </div>
                    <div class="card ulangan hidden" id="ulangan-section">
                        <h3>📝 Ulangan</h3>
                        <ul></ul>
                    </div>
                    <div class="two-row">
                        <div class="card pr hidden" id="pr-section">
                            <h3>📌 PR Besok</h3>
                            <ul></ul>
                        </div>
                        <div class="card piket hidden" id="piket-section">
                            <h3>🧹 Piket Besok</h3>
                            <ul></ul>
                        </div>
                    </div>
                    <div class="card note hidden" id="note-section">
                        <h3>📝 Tambahan</h3>
                        <p style="
                        white-space: pre-line;
                        "></p>
                    </div>
                    <p class="subinfo hidden" style="
                    opacity: 0.5;
                    text-align: center;
                    font-size: clamp(10px, 1.5vh, 20px);
                    ">Web dibuat oleh Kaelo.<br>Pengumuman diketik oleh Firly (sekretaris).</p>
                </div>
                <div class="page second-page">
                    <div style="
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    width: 100%;
                    height: 100vh;
                    background: #ffffff;
                    border-radius: 12px;"
                    >
                    <p style="
                    text-align: center;">Diisi apa ini hayo😈</p>
                </div>
                </div>
            </div>
        </div>
    </body>
</html>
