<!DOCTYPE html>
<html lang="id-ID">
    <head>
        <script src="/main/resource/script.js" defer></script>
        <link href="/main/resource/style.css" rel="stylesheet">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <meta name="description" content="Pengumuman kelas untuk siswa-siswi VII C di Spenda Pangkalpinang.">
        <title>Pengumuman VIIC</title>
    </head>
    <body>
        <video src="/medias/bg-vid-overlay.mp4" autoplay muted loop style="
            opacity: 0.1;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.9);
            z-index: -1;"
        ></video>
        <div class="wrapper">
            <div class="container" id="container">
                <div id="first-page" class="page main-page">
                    <div class="header hidden">
                        <p style="
                        opacity: 0.7;
                        margin-left: 12px;
                        font-size: clamp(0px, 5vw, 28px);
                        font-weight: 500;
                        text-wrap: balance;
                        ">Pengumuman Kelas</p>
    
                        <span id="date" style="
                        position: relative;
                        top: 4px;
                        margin-left: 8px;
                        margin-right: 12px;
                        color: gray;
                        font-family: monospace, sans-serif;
                        font-size: clamp(8px, 2vw, 12px);
                        text-wrap: balance;
                        ">( undefined )</span>
                    </div>
                    <div class="glassify card mapel hidden" id="mapel-section">
                        <h3>🗓️ Mapel Besok</h3>
                        <ul></ul>
                    </div>
                    <div class="glassify card ulangan hidden" id="ulangan-section">
                        <h3>📝 Ulangan</h3>
                        <ul></ul>
                    </div>
                    <div class="two-row">
                        <div class="glassify card pr hidden" id="pr-section">
                            <h3>📌 PR Besok</h3>
                            <ul></ul>
                        </div>
                        <div class="glassify card piket hidden" id="piket-section">
                            <h3>🧹 Piket Besok</h3>
                            <ul></ul>
                        </div>
                    </div>
                    <div class="glassify card note hidden" id="note-section">
                        <h3>📝 Tambahan</h3>
                        <p style="
                        white-space: pre-line;
                        "></p>
                    </div>
                    <p class="subinfo hidden">Web dibuat oleh Kaelo.<br>Pengumuman diketik oleh Firly (sekretaris).</p>
                    <span id="version" class="subinfo hidden">Build: null</span>
                </div>
                <div id="second-page" class="page second-page">
                    <div class="glassify card" style="
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    width: 100%;
                    height: 100dvh;
                    border-radius: 12px;"
                    >
                    <p style="
                    text-align: center;">Diisi apa ini hayo😈</p>
                </div>
                </div>
            </div>
        </div>
    </body>
</html>
