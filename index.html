<!DOCTYPE html>
<html>
    <head>
        <script src="/main/resource/script.js" defer></script>
        <link href="/main/resource/style.css" rel="stylesheet">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

        <title>Pengumuman VIIC</title>
    </head>
    <body>
        <audio id="memory-bgm" src="bergema till kiamat.mp3"></audio>
        <div class="hidden nst-overlay"></div>
        <div class="wrapper">
            <div class="side left">
                <p>^<br>Memori Kelas VIIC</p>
                <div class="memories">
                    <div class="grid v-grid">
                        <img src="medias/memo1.jpeg">
                        <img src="medias/memo2.jpeg">
                    </div>
                    <div class="grid h-grid">
                        <img src="medias/memo10.jpeg">
                        <img src="medias/memo11.jpeg">
                    </div>
                    <div class="grid v-grid">
                        <video src="medias/memo5.mp4" autoplay loop muted playsinline></video>
                        <video src="medias/memo6.mp4" autoplay loop muted playsinline></video>
                    </div>
                    <div class="bottom-rds grid v-grid">
                        <img src="medias/memo7.jpeg">
                        <img src="medias/memo8.jpeg">
                    </div>
                    <div class="grid v-grid">
                        <img src="medias/memo9.jpeg" style="
                    object-position: left center;">
                        <img src="medias/memo13.jpeg">
                    </div>
                    <div class="grid h-grid">
                        <img src="medias/memo12.jpeg">
                        <img src="medias/memo14.jpeg">
                    </div>
                </div>
            </div>
            <div class="side right">
                <p>Yang ini.. diisi apa yaa men-temen??🤔</p>
            </div>
            <div class="container" id="container">
                <div class="header hidden">
                    <p style="
                    opacity: 0.7;
                    margin-left: 12px;
                    font-size: clamp(0px, 5vw, 28px);
                    font-weight: 500;
                    text-wrap: balance;
                    ">Pengumuman Kelas</p>

                    <span id="date" style="
                    position: relative;
                    top: 4px;
                    margin-left: 8px;
                    margin-right: 12px;
                    color: gray;
                    font-family: monospace, sans-serif;
                    font-size: clamp(8px, 2vw, 12px);
                    text-wrap: balance;
                    ">( undefined )</span>
                </div>
                <div class="card mapel hidden" id="mapel-section">
                    <h3>🗓️ Mapel Besok</h3>
                    <ul></ul>
                </div>
                <div class="two-row">
                    <div class="card pr hidden" id="pr-section">
                        <h3>📌 PR Besok</h3>
                        <ul></ul>
                    </div>
                    <div class="card piket hidden" id="piket-section">
                        <h3>🧹 Piket Besok</h3>
                        <ul></ul>
                    </div>
                </div>
                <div class="card note hidden" id="note-section">
                    <h3>📝 Tambahan</h3>
                    <p></p>
                </div>
                <p class="subinfo hidden" style="
                opacity: 0.5;
                text-align: center;
                font-size: clamp(10px, 1.5vh, 20px);
                ">Web dibuat oleh Kaelo.<br>Pengumuman diketik oleh Firly (sekretaris).</p>
            </div>
        </div>
    </body>
</html>
