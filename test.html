<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <style>
            html {
                height: 100%;
            }

            body {
                background-color: #f5f7fb;
                margin: 0;
                height: 100%;
                overflow-x: hidden;
                font-family: 'Poppins', sans-serif;
            }

            .wrapper {
                display: flex;
                flex-direction: row;
                width: 100%;
                height: 100%;
            }

            .side {
                display: flex;
                align-items: center;
                z-index: 0;
                position: fixed;
                top: 0;                
                opacity: 0;
                width: 50%;
                height: 100%;
                padding: 20px;
                transition: opacity 0.2s ease;
            }

            .left {
                justify-content: left;
                left: 0;
                background: lightblue;
            }

            .right {
                justify-content: right;
                right: 0;
                background: lightpink;
            }

            .container {
                display: flex;
                flex-direction: column;
                justify-content: center;
                font-size: clamp(14px, 2.5vw, 18px);
                background: #f5f7fb;
                user-select: none;
                position: fixed;
                z-index: 1;
                padding: 0px 20px;
                box-sizing: border-box;
                width: 100vw;
                height: 100%;
                touch-action: pan-y;
                transition: transform 0.3s ease;
                will-change: transform;
                overflow-x: hidden;
                overflow-y: auto;
                overscroll-behavior: contain;
                -webkit-overflow-scrolling: touch;
            }

            .header {
                display: flex;
                align-items: center;
                justify-content: left;
                background-color: #ffffff;
                border-radius: 12px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.05);
                margin-bottom: 20px;
            }

            .card {
                background-color: #ffffff;
                border-radius: 12px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.05);
                padding: 16px;
                margin-bottom: 20px;
                transition: all 0.2s ease;
                cursor: default;
            }

            .card:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 16px rgba(0,0,0,0.08);
            }

            .card h3 {
                margin-top: 0;
                font-size: clamp(16px, 4vw, 20px);
                margin-bottom: 12px;
            }

            .card ul {
                padding-left: 20px;
                margin: 0;
            }

            .card li {
                padding: 6px 10px;
                border-radius: 8px;
            }

            .card li:hover {
                background-color: #f1f5f9;
            }

            .mapel h3 { color: #3B82F6; }
            .pr h3 { color: #F59E0B; }
            .piket h3 { color: #10B981; }
            .note h3 { color: #6B7280; }

            .two-row {
                display: flex;
                flex-direction: row;
                gap: 20px;
            }

            .two-row .card {
                width: 50%;
            }

            .two-row .pr li {
                cursor: pointer;
                pointer-events: all;
                transition: all 0.2s ease;
            }

            .two-row .pr li:hover {
                color: #265579;
                background-color: #ffffff;
                text-decoration: underline;
            }

            .done {
                text-decoration: line-through;
                color: #10B981;
                opacity: 0.7;
            }

            .done::before {
                content: "✔ ";
            }

            .hidden {
                opacity: 0;
                visibility: hidden;
                transition: all 0.7s ease;
                transform: translateY(-3px);
            }

            .show {
                opacity: 1;
                visibility: visible;
                transition: all 0.7s ease;
                transform: translateY(0px);
            }
        </style>
    </head>
    <body>
        
        <script defer>
            let data = {};
            let tanggal;
            let mapel = [];
            let pr = [];
            let piket = [];
            let note = [];
            let checkedPR = {};

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    hideAll();
                    getData();
                }
            });

            async function getData() {
                try {
                    const res = await fetch('https://viic-pengumuman.vercel.app/api/pengumuman');
                    data = await res.json();
                    console.log('Data fetched:', data);

                    tanggal = data.tanggal_besok;
                    mapel = data.mapel.split(',').map(item => item.trim());
                    pr = data.pr.split('$').map(item => item.trim());
                    piket = data.piket.split(',').map(item => item.trim());
                    note = data.note;

                    console.log('Tanggal:', tanggal);
                    console.log('Mapel:', mapel);
                    console.log('PR:', pr);
                    console.log('Piket:', piket);
                    console.log('Note:', note);

                    const lastUUID = JSON.parse(localStorage.getItem('current_uuid')) || 0;

                    if (data.uuid === lastUUID) {
                        checkedPR = JSON.parse(localStorage.getItem('checkedPR')) || {};
                    } else {
                        checkedPR = {};
                    }

                    renderData();
                    addWhenClicked();
                } catch (error) {
                    console.error('Error fetching data:', error);
                }
            }

            function renderData() {
                const tanggalEl = document.querySelector('#date');
                const mapelCard = document.querySelector('.mapel ul');
                const prCard = document.querySelector('.pr ul');
                const piketCard = document.querySelector('.piket ul');
                const noteCard = document.querySelector('.note p');

                mapelCard.innerHTML = '';
                prCard.innerHTML = '';
                piketCard.innerHTML = '';

                tanggalEl.textContent = (`( ${tanggal} )`);

                mapel.forEach(mapelItem => {
                    const li = document.createElement('li');
                    li.textContent = mapelItem;
                    mapelCard.appendChild(li);
                });

                pr.forEach((prItem, index) => {
                    const li = document.createElement('li');
                    li.textContent = prItem;

                    li.dataset.index = index;

                    if (checkedPR[index]) {
                        li.classList.add('done');
                    }

                    prCard.appendChild(li);
                });

                piket.forEach(piketItem => {
                    const li = document.createElement('li');
                    li.textContent = piketItem;
                    piketCard.appendChild(li);
                });

                noteCard.textContent = note;

                showAll();
            }

            function addWhenClicked() {
                const prItems = document.querySelectorAll('.pr li');

                prItems.forEach(pr => {
                    pr.addEventListener('click', () => {
                        pr.classList.toggle('done');

                        const index = pr.dataset.index;
                        checkedPR[index] = pr.classList.contains('done');
                        localStorage.setItem('checkedPR', JSON.stringify(checkedPR));
                        localStorage.setItem('current_uuid', JSON.stringify(data.uuid));
                    });
                });
            };

            function showAll() {
                const headerEl = document.querySelector('.header');
                const cardEls = document.querySelectorAll('.card')
                const subinfoEl = document.querySelector('.subinfo');

                headerEl.classList.remove('hidden')
                headerEl.classList.add('show');

                cardEls.forEach((card, index) => {
                    setTimeout(() => {
                        card.classList.remove('hidden');
                        card.classList.add('show');
                    }, index * 100);
                });

                subinfoEl.classList.remove('hidden')
                subinfoEl.classList.add('show');

            };

            function hideAll() {
                const headerEl = document.querySelector('.header');
                const cardEls = document.querySelectorAll('.card')
                const subinfoEl = document.querySelector('.subinfo');
                
                
                headerEl.classList.remove('show')
                headerEl.classList.add('hidden');
                
                cardEls.forEach((card, index) => {
                    setTimeout(() => {
                        card.classList.remove('show');
                        card.classList.add('hidden');
                    }, index * 100);
                });

                subinfoEl.classList.remove('show')
                subinfoEl.classList.add('hidden');

            };

            getData();

            const card = document.querySelector('#container');
            const left = document.querySelector('.left');
            const right = document.querySelector('.right');

            let startX = 0;
            let startY = 0;
            let currentX = 0;
            let isDragging = false;
            let isHorizontal = null;

            card.addEventListener('pointerdown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                isHorizontal = null;
                card.style.transition = 'none';
            });

            window.addEventListener('pointermove', (e) => {
                if (!isDragging) return;

                currentX = (e.clientX - startX) * 0.6;

                const dx = e.clientX - startX;
                const dy = e.clientY - startY;

                if (isHorizontal === null) {
                    isHorizontal = Math.abs(dx) > Math.abs(dy);
                }

                if (!isHorizontal) return;

                if (currentX > 100) currentX = 100;
                if (currentX < -100) currentX = -100;
                
                card.style.transform = `translateX(${currentX}px)`;
                left.style.opacity = currentX > 0 ? currentX / 100 : 0;
                right.style.opacity = currentX < 0 ? -currentX / 100 : 0;
            });

            window.addEventListener('pointerup', () => {
                if (!isDragging) return;
                isDragging = false;

                card.style.transition = 'transform 0.3s ease';
                card.style.transform = `translateX(0px)`;

                left.style.opacity = 0;
                right.style.opacity = 0;
            });
        </script>
    </body>
</html>
