<!DOCTYPE html>
<html>
    <head>
        <script src="/add/resource/script.js" defer></script>
        <link href="/add/resource/style.css" rel="stylesheet">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

        <title>Pengumuman VIIC</title>
    </head>
    <body class="hidden">
        <p style="color: #3B82F6;">🗓️ Mapel Besok</p>
        <textarea id="mapelInput" placeholder="(Otomatis)" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
        <p style="color: #f6413b;">📝 Ulangan</p>
        <button type="button" class="add-drop" id="add-ulangan">+</button>
        <select class="dropdown disabled" id="ulangan-mapel-drop">
            <option disabled selected>Pilih Mapel</option>
            <option value="Bahasa Indonesia">B. Indonesia</option>
            <option value="Matematika">Matematika</option>
            <option value="Pendidikan Pancasila">Pendidikan Pancasila</option>
            <option value="Prakarya">Prakarya</option>
            <option value="IPA Biologi">IPA Biologi</option>
            <option value="IPA Fisika">IPA Fisika</option>
            <option value="IPS">IPS</option>
            <option value="Informatika">Informatika</option>
            <option value="PAI">PAI</option>
            <option value="PJOK">PJOK</option>
        </select>

        <ul class="drop-container ulangan-container"></ul>

        <template class="templates" id="ulangan-items-template">
            <li>
                <div class="items ulangan-items">
                    <p class="items-mapel ulangan-items-mapel">Matematika:</p>
                    <textarea class="items-details ulangan-details-input" placeholder="Penjelasan lebih lengkap (misal: halaman, keterangan, dll)."></textarea>
                </div>
            </li>
        </template>
        
        <p style="color: #F59E0B;">📌 PR Besok</p>
        <button type="button" class="add-drop" id="add-pr">+</button>
        <select class="dropdown disabled" id="pr-mapel-drop">
            <option disabled selected>Pilih Mapel</option>
            <option value="Bahasa Indonesia">B. Indonesia</option>
            <option value="Matematika">Matematika</option>
            <option value="Pendidikan Pancasila">Pendidikan Pancasila</option>
            <option value="Prakarya">Prakarya</option>
            <option value="IPA Biologi">IPA Biologi</option>
            <option value="IPA Fisika">IPA Fisika</option>
            <option value="IPS">IPS</option>
            <option value="Informatika">Informatika</option>
            <option value="PAI">PAI</option>
            <option value="PJOK">PJOK</option>
        </select>

        <ul class="drop-container pr-container"></ul>

        <template class="templates" id="pr-items-template">
            <li>
                <div class="items pr-items">
                    <p class="items-mapel pr-items-mapel">Matematika:</p>
                    <textarea class="items-details pr-details-input" placeholder="Penjelasan lebih lengkap (misal: halaman, keterangan, dll)."></textarea>
                </div>
            </li>
        </template>
        <p style="color: #10B981;">🧹 Piket Besok</p>
        <textarea id="piketInput" placeholder="(Otomatis)" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
        <p style="color: #6B7280;">📝 Tambahan</p>
        <textarea id="tambahanInput" placeholder="Isi tambahan jika ada*" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
        <button type="button" id="sendInput">Done ga bang? Done lah masa engga</button>
    </body>
</html>
